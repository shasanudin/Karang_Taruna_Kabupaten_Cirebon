<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karang Taruna Kabupaten Cirebon - Login Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo img {
            height: 45px;
            width: auto;
        }
        .logo h2 {
            color: white;
            font-size: 1.3rem;
        }
        .logo span {
            color: #ffd700;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        .nav-menu a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        .nav-menu a:hover,
        .nav-menu a.active {
            background: rgba(255,255,255,0.2);
            color: #ffd700;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 3px 0;
            transition: 0.3s;
        }
        
        /* Login Section */
        .login-section {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 3.5rem;
            color: #2a5298;
        }
        .login-header h2 {
            margin: 1rem 0 0.5rem;
            color: #1e3c72;
        }
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42,82,152,0.1);
        }
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .login-message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 8px;
        }
        .login-message.error {
            color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }
        .login-message.success {
            color: #27ae60;
            background: rgba(39,174,96,0.1);
        }
        .login-message.info {
            color: #2a5298;
            background: rgba(42,82,152,0.1);
        }
        
        /* Footer */
        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 0;
        }
        footer p {
            margin: 5px 0;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            .nav-menu {
                position: fixed;
                left: -100%;
                top: 70px;
                flex-direction: column;
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                width: 100%;
                text-align: center;
                transition: 0.3s;
                padding: 2rem 0;
                gap: 1rem;
            }
            .nav-menu.active {
                left: 0;
            }
            .login-box {
                padding: 1.5rem;
            }
            .login-header h2 {
                font-size: 1.5rem;
            }
            .login-section {
                padding: 5rem 1rem 2rem;
            }
        }
        @media (max-width: 480px) {
            .login-header h2 {
                font-size: 1.3rem;
            }
            .login-header p {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/shasanudin/Karang_Taruna_Kabupaten_Cirebon/main/images/logo/Karang-Taruna-Logo-Vector-removebg-preview.png" alt="Logo Karang Taruna">
                <h2>KARANG TARUNA <span>CIREBON</span></h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="data.html">Data</a></li>
                <li><a href="sekretariat.html">Sekretariat</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main>
        <section class="login-section">
            <div class="login-container">
                <div class="login-box">
                    <div class="login-header">
                        <i class="fas fa-user-lock"></i>
                        <h2>Login Admin</h2>
                        <p>Masuk untuk mengelola data Karang Taruna Kabupaten Cirebon</p>
                    </div>
                    <form id="loginForm">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Email" required autocomplete="email">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="login-btn" id="loginBtn">
                            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                            Login
                        </button>
                    </form>
                    <div id="loginMessage" class="login-message"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Karang Taruna Kabupaten Cirebon. All Rights Reserved.</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">Berlandaskan Pancasila dan Undang-Undang Dasar 1945</p>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- All JavaScript for login.html - INDEPENDENT, tidak tergantung script.js -->
    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCDOejXR-_38GBS2jTg6GHMy-AkOP1A2dM",
            authDomain: "karang-taruna-dalam-data.firebaseapp.com",
            databaseURL: "https://karang-taruna-dalam-data-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "karang-taruna-dalam-data",
            storageBucket: "karang-taruna-dalam-data.firebasestorage.app",
            messagingSenderId: "922028160917",
            appId: "1:922028160917:web:8397305a92af28c0ca689c",
            measurementId: "G-8JNPDJPRM1"
        };
        
        // Initialize Firebase (hanya sekali)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase initialized on login.html');
        }
        
        const auth = firebase.auth();
        
        // ==================== HELPER FUNCTIONS ====================
        function showMessage(message, type = 'error') {
            const messageElem = document.getElementById('loginMessage');
            if (messageElem) {
                messageElem.textContent = message;
                messageElem.className = `login-message ${type}`;
                
                // Hilangkan pesan setelah 5 detik
                setTimeout(() => {
                    if (messageElem.textContent === message) {
                        messageElem.textContent = '';
                        messageElem.className = 'login-message';
                    }
                }, 5000);
            }
        }
        
        function setLoading(isLoading) {
            const loginBtn = document.getElementById('loginBtn');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            if (loginBtn) {
                if (isLoading) {
                    loginBtn.disabled = true;
                    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i>Memproses...';
                } else {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Login';
                }
            }
            
            if (emailInput) emailInput.disabled = isLoading;
            if (passwordInput) passwordInput.disabled = isLoading;
        }
        
        // ==================== LOGIN FUNCTION ====================
        function setupLogin() {
            const loginForm = document.getElementById('loginForm');
            if (!loginForm) return;
            
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email')?.value.trim();
                const password = document.getElementById('password')?.value;
                
                // Validasi input
                if (!email || !password) {
                    showMessage('Email dan password harus diisi!', 'error');
                    return;
                }
                
                if (!email.includes('@') || !email.includes('.')) {
                    showMessage('Format email tidak valid!', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showMessage('Password minimal 6 karakter!', 'error');
                    return;
                }
                
                setLoading(true);
                showMessage('Memproses login...', 'info');
                
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    
                    console.log('✅ Login berhasil:', user.email);
                    showMessage('Login berhasil! Mengalihkan...', 'success');
                    
                    // Redirect ke dashboard setelah 1 detik
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } catch (error) {
                    console.error('Login error:', error.code, error.message);
                    setLoading(false);
                    
                    let errorMessage = 'Login gagal: ';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            errorMessage += 'Email tidak terdaftar. Silakan hubungi administrator.';
                            break;
                        case 'auth/wrong-password':
                            errorMessage += 'Password salah. Silakan coba lagi.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage += 'Format email tidak valid.';
                            break;
                        case 'auth/user-disabled':
                            errorMessage += 'Akun Anda telah dinonaktifkan.';
                            break;
                        case 'auth/too-many-requests':
                            errorMessage += 'Terlalu banyak percobaan. Silakan coba lagi nanti.';
                            break;
                        case 'auth/network-request-failed':
                            errorMessage += 'Koneksi internet bermasalah. Periksa koneksi Anda.';
                            break;
                        default:
                            errorMessage += error.message;
                    }
                    showMessage(errorMessage, 'error');
                }
            });
        }
        
        // ==================== CHECK AUTH STATE ====================
        function checkAuthState() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    console.log('✅ User already logged in:', user.email);
                    // Jika sudah login dan sedang di halaman login, redirect ke dashboard
                    if (window.location.pathname.includes('login.html') || 
                        window.location.pathname === '/login.html') {
                        showMessage('Anda sudah login. Mengalihkan...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    }
                } else {
                    console.log('👤 No user logged in');
                }
            });
        }
        
        // ==================== NAVIGATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Hamburger menu toggle
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.nav-menu');
            if (hamburger) {
                hamburger.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }
            
            // Setup login form
            setupLogin();
            
            // Check auth state
            checkAuthState();
        });
    </script>
</body>
</html>
