<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karang Taruna Kabupaten Cirebon - Data</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>KARANG TARUNA <span>CIREBON</span></h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="data.html" class="active">Data</a></li>
                <li><a href="sekretariat.html">Sekretariat</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>Data Karang Taruna</h1>
                <p>Data lengkap Karang Taruna se-Kabupaten Cirebon</p>
            </div>
        </section>

        <section class="data-section">
            <div class="container">
                <div class="data-controls">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Cari kecamatan atau desa...">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">Semua</button>
                        <button class="filter-btn" data-filter="kecamatan">Kecamatan</button>
                        <button class="filter-btn" data-filter="desa">Desa</button>
                    </div>
                </div>

                <div class="data-summary">
                    <div class="summary-card">
                        <i class="fas fa-building"></i>
                        <span id="totalKecamatan">0</span>
                        <label>Kecamatan</label>
                    </div>
                    <div class="summary-card">
                        <i class="fas fa-home"></i>
                        <span id="totalDesa">0</span>
                        <label>Desa</label>
                    </div>
                </div>

                <div id="dataContainer" class="data-grid">
                    <div class="loading">Memuat data...</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Karang Taruna Kabupaten Cirebon. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-database-compat.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
